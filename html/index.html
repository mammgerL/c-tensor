<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNIST 学习实验室</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --bg-0: #f3f8f4;
            --bg-1: #dfeee0;
            --ink: #152018;
            --muted: #5a6d60;
            --card: #ffffffd9;
            --line: #b6cdbb;
            --accent: #1f9d68;
            --accent-2: #2f6ecf;
            --warn: #cf4f2f;
            --good: #2d9a4d;
            --shadow: 0 10px 30px rgba(14, 40, 20, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            font-family: "IBM Plex Sans", "Avenir Next", "PingFang SC", sans-serif;
            background:
                radial-gradient(circle at 8% 8%, #ffffff 0%, transparent 44%),
                radial-gradient(circle at 95% 12%, #cde6cf 0%, transparent 36%),
                linear-gradient(135deg, var(--bg-0), var(--bg-1));
        }

        .container {
            max-width: 1500px;
            margin: 0 auto;
            padding: 18px;
        }

        .hero {
            background: linear-gradient(120deg, #144936, #17503b 50%, #2f6ecf);
            color: #f4fff9;
            border-radius: 16px;
            padding: 20px 24px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }

        .hero h1 {
            margin: 0 0 8px 0;
            font-family: "Space Grotesk", "SF Pro Display", sans-serif;
            font-size: clamp(24px, 2.5vw, 34px);
            letter-spacing: 0.01em;
        }

        .hero p {
            margin: 0;
            color: #d8f2e2;
            line-height: 1.5;
        }

        .grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 14px;
            margin-bottom: 14px;
        }

        .panel {
            background: var(--card);
            backdrop-filter: blur(4px);
            border: 1px solid #ffffffc9;
            border-radius: 14px;
            padding: 16px;
            box-shadow: var(--shadow);
        }

        .panel h2 {
            margin: 0 0 12px 0;
            font-size: 18px;
            font-family: "Space Grotesk", "SF Pro Display", sans-serif;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }

        .controls label,
        .lab-controls label {
            font-size: 13px;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input,
        select,
        button {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 14px;
            background: #fff;
            color: var(--ink);
        }

        button {
            cursor: pointer;
            transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(23, 80, 59, 0.16);
        }

        .btn-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-main {
            background: linear-gradient(120deg, var(--accent), #177f56);
            color: white;
            border: none;
        }

        .btn-sub {
            background: #f3faf6;
        }

        .filter-stats {
            margin: 8px 0 0 0;
            font-size: 13px;
            color: var(--muted);
        }

        .image-wrap {
            display: flex;
            justify-content: center;
            margin: 12px 0;
        }

        #imageCanvas {
            border-radius: 10px;
            border: 1px solid #d4e4d5;
            background: #fff;
            image-rendering: pixelated;
            box-shadow: inset 0 0 0 1px #ffffff;
        }

        .image-info {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .result-good {
            color: var(--good);
            font-weight: 700;
        }

        .result-bad {
            color: var(--warn);
            font-weight: 700;
        }

        .network-diagram {
            height: 360px;
            position: relative;
            border-radius: 10px;
            border: 1px solid #d5e8db;
            background: linear-gradient(150deg, #f9fffb, #edf7f0);
            overflow: hidden;
        }

        #network-svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .activation-tooltip {
            position: absolute;
            pointer-events: none;
            display: none;
            z-index: 50;
            font-size: 12px;
            background: #152018;
            color: #effaf2;
            border-radius: 6px;
            padding: 6px 8px;
            max-width: 220px;
        }

        .probabilities,
        .contrib-list,
        .stats,
        .class-stats {
            display: grid;
            gap: 8px;
        }

        .prob-row,
        .class-row {
            display: grid;
            grid-template-columns: 28px 1fr 62px;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .track {
            height: 16px;
            border-radius: 999px;
            background: #e5f1e8;
            overflow: hidden;
        }

        .fill {
            height: 100%;
            transition: width 0.32s ease;
        }

        .prob-row .fill {
            background: linear-gradient(90deg, #2f6ecf, #4f93ff);
        }

        .prob-row.pred .fill {
            background: linear-gradient(90deg, #1f9d68, #26bc7c);
        }

        .prob-row.runner .fill {
            background: linear-gradient(90deg, #da8f2b, #efb84d);
        }

        .activation-grid {
            margin-top: 10px;
            display: grid;
            grid-template-columns: repeat(16, minmax(0, 1fr));
            gap: 2px;
        }

        .activation-cell {
            aspect-ratio: 1;
            border-radius: 3px;
            border: 1px solid #e9f3ec;
            position: relative;
            transition: transform 0.14s ease;
            background: rgba(47, 110, 207, calc(var(--a) * 0.9));
        }

        .activation-cell:hover {
            transform: scale(1.05);
        }

        .activation-cell.top {
            border-color: #177f56;
            box-shadow: inset 0 0 0 1px #177f56;
        }

        .section-title {
            margin: 14px 0 8px 0;
            font-size: 14px;
            font-weight: 700;
            color: #213528;
        }

        .contrib-row {
            display: grid;
            grid-template-columns: 42px 1fr 72px;
            gap: 8px;
            align-items: center;
            font-size: 13px;
        }

        .contrib-row .fill {
            background: linear-gradient(90deg, #0f8f58, #1fc878);
        }

        .contrib-row.neg .fill {
            background: linear-gradient(90deg, #c15a47, #e68b7b);
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            padding: 4px 0;
            border-bottom: 1px dashed #d7e7dc;
        }

        .stat-item strong {
            color: var(--accent-2);
        }

        .lab-controls {
            display: grid;
            grid-template-columns: 1.4fr auto auto;
            gap: 10px;
            align-items: center;
        }

        .lab-controls input[type="range"] {
            width: 100%;
            padding: 0;
            accent-color: var(--accent);
        }

        .step-meta {
            margin-top: 10px;
            font-size: 14px;
            color: #244034;
            min-height: 44px;
        }

        .step-cards {
            margin-top: 12px;
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 8px;
        }

        .step-card {
            border: 1px solid #d6e9dc;
            border-radius: 8px;
            padding: 9px;
            font-size: 12px;
            color: #496055;
            background: #f9fffb;
            transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
        }

        .step-card.active {
            border-color: #2f6ecf;
            background: #eaf2ff;
            color: #1f3f7d;
            transform: translateY(-1px);
        }

        .step-card.done {
            border-color: #99c8b4;
            background: #ecf8f2;
            color: #2e6650;
        }

        .loading,
        .error-message {
            text-align: center;
            padding: 20px;
            color: var(--muted);
        }

        .error-message {
            color: #a53232;
        }

        @media (max-width: 1024px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .lab-controls {
                grid-template-columns: 1fr;
            }

            .step-cards {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <section class="hero">
            <h1>MNIST 学习实验室</h1>
            <p>把一次前向推理拆成可播放步骤：输入像素、隐藏层激活、关键神经元贡献、输出概率与最终决策。</p>
        </section>

        <section class="grid">
            <div class="panel">
                <h2>样本与网络状态</h2>
                <div class="controls">
                    <label>样本索引
                        <input type="number" id="indexInput" value="0" min="0" max="9999">
                    </label>
                    <label>筛选视图
                        <select id="filterSelect">
                            <option value="all">全部样本</option>
                            <option value="correct">仅正确</option>
                            <option value="incorrect">仅错误</option>
                        </select>
                    </label>
                </div>
                <div class="btn-row">
                    <button id="prevBtn" class="btn-sub">← 上一个</button>
                    <button id="nextBtn" class="btn-sub">下一个 →</button>
                    <button id="randomBtn" class="btn-main">随机样本</button>
                </div>
                <p class="filter-stats" id="filterStats">筛选统计加载中...</p>

                <div class="image-wrap">
                    <canvas id="imageCanvas" width="224" height="224"></canvas>
                </div>

                <div class="image-info" id="labelDisplay"></div>
                <div class="image-info" id="detailDisplay"></div>

                <div class="network-diagram">
                    <svg id="network-svg"></svg>
                    <div class="activation-tooltip" id="tooltip"></div>
                </div>
            </div>

            <div class="panel">
                <h2>输出分布与隐藏层解释</h2>

                <div class="section-title">输出概率</div>
                <div id="probabilities" class="probabilities"></div>

                <div class="section-title">关键隐藏神经元贡献</div>
                <div id="contributors" class="contrib-list"></div>

                <div class="section-title">隐藏层激活热力图 (256)</div>
                <div id="hiddenActivations" class="activation-grid"></div>

                <div class="section-title">整体评估</div>
                <div id="stats" class="stats"></div>

                <div class="section-title">各数字准确率</div>
                <div id="classStats" class="class-stats"></div>
            </div>
        </section>

        <section class="panel">
            <h2>学习过程播放</h2>
            <div class="lab-controls">
                <label>
                    当前步骤
                    <input id="stepRange" type="range" min="0" max="4" value="0" step="1">
                </label>
                <label>
                    速度
                    <select id="speedSelect">
                        <option value="2200">慢速</option>
                        <option value="1500" selected>标准</option>
                        <option value="900">快速</option>
                    </select>
                </label>
                <button id="playBtn" class="btn-main">▶ 自动播放</button>
            </div>
            <div class="step-meta" id="stepMeta"></div>
            <div class="step-cards" id="stepCards"></div>
        </section>
    </div>

    <script>
        const STEP_DEFS = [
            { title: '输入编码', brief: '28×28 像素映射到 784 维向量。' },
            { title: '隐藏层变换', brief: '矩阵乘 + 偏置 + ReLU，得到 256 激活。' },
            { title: '贡献归因', brief: '挑出对预测类别贡献最大的隐藏神经元。' },
            { title: '输出竞争', brief: '隐藏层线性映射到 10 类，再 softmax。' },
            { title: '最终判断', brief: '比较 top1 / top2，形成置信度与 margin。' }
        ];

        let architecture = null;
        let currentIndex = 0;
        let currentData = null;
        let currentFilter = 'all';
        let filteredIndices = [];
        let autoTimer = null;
        let currentStep = 0;
        const sampleCache = new Map();

        async function fetchJSON(url) {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
            return await response.json();
        }

        function clamp(val, min, max) {
            return Math.max(min, Math.min(max, val));
        }

        function setLoading(text) {
            document.getElementById('filterStats').textContent = text;
        }

        function rememberSample(index, data) {
            sampleCache.set(index, data);
            if (sampleCache.size > 220) {
                const oldestKey = sampleCache.keys().next().value;
                sampleCache.delete(oldestKey);
            }
        }

        function pickEvenIndices(total, count) {
            if (count <= 1) return [0];
            const step = (total - 1) / (count - 1);
            const res = [];
            for (let i = 0; i < count; i++) {
                res.push(Math.floor(i * step));
            }
            return res;
        }

        function drawImage(pixels) {
            const canvas = document.getElementById('imageCanvas');
            const ctx = canvas.getContext('2d');
            const size = 28;
            const scale = 8;

            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const imageData = ctx.createImageData(size, size);
            for (let i = 0; i < pixels.length; i++) {
                const normalized = (pixels[i] + 1) / 2;
                const px = Math.max(0, Math.min(255, Math.round(normalized * 255)));
                imageData.data[i * 4] = px;
                imageData.data[i * 4 + 1] = px;
                imageData.data[i * 4 + 2] = px;
                imageData.data[i * 4 + 3] = 255;
            }

            const temp = document.createElement('canvas');
            temp.width = size;
            temp.height = size;
            temp.getContext('2d').putImageData(imageData, 0, 0);

            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(temp, 8, 8, size * scale, size * scale);
        }

        function displayLabels(data) {
            const labelDiv = document.getElementById('labelDisplay');
            const detailDiv = document.getElementById('detailDisplay');
            const ok = data.correct;

            labelDiv.innerHTML = `
                真实标签 <strong>${data.true_label}</strong> ｜ 预测标签 <strong>${data.predicted}</strong><br>
                <span class="${ok ? 'result-good' : 'result-bad'}">${ok ? '✓ 预测正确' : '✗ 预测错误'}</span>
            `;

            const confPct = (data.confidence * 100).toFixed(2);
            const marginPct = (data.margin * 100).toFixed(2);
            detailDiv.innerHTML = `
                置信度: <strong>${confPct}%</strong> ｜
                次优类别: <strong>${data.runner_up}</strong> ｜
                边际差值 (top1-top2): <strong>${marginPct}%</strong>
            `;
        }

        function displayProbabilities(data) {
            const probs = (data.probabilities || data.output.map(v => Math.exp(v))).map((p, digit) => ({
                digit,
                prob: p
            }));
            const sum = probs.reduce((acc, item) => acc + item.prob, 0);
            if (sum > 0) probs.forEach(item => item.prob /= sum);
            probs.sort((a, b) => b.prob - a.prob);

            const container = document.getElementById('probabilities');
            container.innerHTML = probs.map((item) => {
                const cls = item.digit === data.predicted ? 'pred' : (item.digit === data.runner_up ? 'runner' : '');
                return `
                    <div class="prob-row ${cls}">
                        <div>${item.digit}</div>
                        <div class="track"><div class="fill" style="width:${(item.prob * 100).toFixed(2)}%"></div></div>
                        <div>${(item.prob * 100).toFixed(2)}%</div>
                    </div>
                `;
            }).join('');
        }

        function displayHiddenActivations(data) {
            const hidden = data.hidden || [];
            const topSet = new Set((data.learning?.top_contributors || []).map(t => t.hidden_index));
            const maxAbs = Math.max(...hidden.map(v => Math.abs(v)), 1e-6);
            const container = document.getElementById('hiddenActivations');

            container.innerHTML = hidden.map((value, idx) => {
                const intensity = Math.min(1, Math.abs(value) / maxAbs);
                const cls = topSet.has(idx) ? 'top' : '';
                return `<div class="activation-cell ${cls}" style="--a:${intensity.toFixed(4)}" title="h${idx}=${value.toFixed(5)}"></div>`;
            }).join('');
        }

        function displayContributors(data) {
            const contributors = data.learning?.top_contributors || [];
            const maxAbs = Math.max(...contributors.map(c => Math.abs(c.contribution)), 1e-6);
            const container = document.getElementById('contributors');

            if (contributors.length === 0) {
                container.innerHTML = '<div style="font-size:13px;color:#6a7c70;">当前样本无可解释贡献数据。</div>';
                return;
            }

            container.innerHTML = contributors.map(c => {
                const ratio = Math.abs(c.contribution) / maxAbs;
                const negCls = c.contribution < 0 ? 'neg' : '';
                return `
                    <div class="contrib-row ${negCls}">
                        <div>h${c.hidden_index}</div>
                        <div class="track"><div class="fill" style="width:${(ratio * 100).toFixed(2)}%"></div></div>
                        <div>${c.contribution.toFixed(4)}</div>
                    </div>
                `;
            }).join('');
        }

        function displayStats(stats) {
            const statsDiv = document.getElementById('stats');
            const classDiv = document.getElementById('classStats');

            statsDiv.innerHTML = `
                <div class="stat-item"><span>总样本</span><strong>${stats.total}</strong></div>
                <div class="stat-item"><span>正确数</span><strong style="color:var(--good)">${stats.correct}</strong></div>
                <div class="stat-item"><span>错误数</span><strong style="color:var(--warn)">${stats.incorrect}</strong></div>
                <div class="stat-item"><span>准确率</span><strong>${stats.accuracy.toFixed(2)}%</strong></div>
                <div class="stat-item"><span>结果来源</span><strong>${stats.cached ? '缓存' : '实时计算'}</strong></div>
            `;

            classDiv.innerHTML = (stats.by_class || []).map(item => `
                <div class="class-row">
                    <div>${item.digit}</div>
                    <div class="track"><div class="fill" style="width:${item.accuracy.toFixed(2)}%"></div></div>
                    <div>${item.accuracy.toFixed(1)}%</div>
                </div>
            `).join('');
        }

        function drawNetwork(data, step) {
            const svg = d3.select('#network-svg');
            svg.selectAll('*').remove();

            const svgNode = svg.node();
            if (!svgNode) return;
            const width = svgNode.clientWidth;
            const height = svgNode.clientHeight;

            const inputCount = 28;
            const hiddenCount = 24;
            const outputCount = 10;

            const inputIdx = pickEvenIndices(data.pixels.length, inputCount);
            const hiddenIdx = pickEvenIndices(data.hidden.length, hiddenCount);
            const topSet = new Set((data.learning?.top_contributors || []).map(c => c.hidden_index));
            const probs = data.probabilities || data.output.map(v => Math.exp(v));
            const probSum = probs.reduce((a, b) => a + b, 0) || 1;

            const nodes = [];
            const layerMeta = [
                { name: 'input', x: 70, count: inputCount, ids: inputIdx },
                { name: 'hidden', x: width * 0.52, count: hiddenCount, ids: hiddenIdx },
                { name: 'output', x: width - 70, count: outputCount, ids: Array.from({ length: outputCount }, (_, i) => i) }
            ];

            layerMeta.forEach(meta => {
                const spacing = (height - 30) / (meta.count + 1);
                for (let i = 0; i < meta.count; i++) {
                    const originIdx = meta.ids[i];
                    let activation = 0;
                    if (meta.name === 'input') activation = (data.pixels[originIdx] + 1) / 2;
                    if (meta.name === 'hidden') activation = data.hidden[originIdx];
                    if (meta.name === 'output') activation = probs[originIdx] / probSum;

                    nodes.push({
                        id: `${meta.name}-${i}`,
                        layer: meta.name,
                        originIdx,
                        x: meta.x,
                        y: 16 + spacing * (i + 1),
                        activation
                    });
                }
            });

            const inputNodes = nodes.filter(n => n.layer === 'input');
            const hiddenNodes = nodes.filter(n => n.layer === 'hidden');
            const outputNodes = nodes.filter(n => n.layer === 'output');

            const links = [];
            inputNodes.forEach(src => {
                hiddenNodes.forEach(dst => links.push({ source: src, target: dst, phase: 'in_hidden' }));
            });
            hiddenNodes.forEach(src => {
                outputNodes.forEach(dst => links.push({
                    source: src,
                    target: dst,
                    phase: 'hidden_out',
                    topPath: topSet.has(src.originIdx) && dst.originIdx === data.predicted
                }));
            });

            svg.selectAll('.link')
                .data(links)
                .enter()
                .append('line')
                .attr('x1', d => d.source.x)
                .attr('y1', d => d.source.y)
                .attr('x2', d => d.target.x)
                .attr('y2', d => d.target.y)
                .attr('stroke', d => {
                    if (step === 2 && d.topPath) return '#0c8a54';
                    if (d.phase === 'hidden_out' && step >= 3) return '#446fb8';
                    if (d.phase === 'in_hidden' && step >= 1) return '#4d9f79';
                    return '#9bb3a3';
                })
                .attr('stroke-width', d => (step === 2 && d.topPath) ? 1.5 : 0.6)
                .attr('stroke-opacity', d => {
                    if (step === 0) return 0.04;
                    if (step === 1 && d.phase === 'in_hidden') return 0.18;
                    if (step === 2 && d.topPath) return 0.9;
                    if (step >= 3 && d.phase === 'hidden_out') return 0.2;
                    return 0.05;
                });

            const tooltip = document.getElementById('tooltip');

            svg.selectAll('.node')
                .data(nodes)
                .enter()
                .append('circle')
                .attr('cx', d => d.x)
                .attr('cy', d => d.y)
                .attr('r', d => {
                    if (d.layer === 'output') return 8;
                    if (d.layer === 'hidden') return topSet.has(d.originIdx) ? 7 : 5;
                    return 4.5;
                })
                .attr('fill', d => {
                    if (d.layer === 'input') {
                        const g = clamp(Math.round(d.activation * 255), 0, 255);
                        return `rgb(${g},${g},${g})`;
                    }
                    if (d.layer === 'hidden') {
                        const intensity = clamp(Math.abs(d.activation) * 2.8, 0.08, 1);
                        return topSet.has(d.originIdx)
                            ? `rgba(15,143,88,${intensity})`
                            : `rgba(47,110,207,${intensity})`;
                    }
                    const p = clamp(d.activation, 0, 1);
                    if (d.originIdx === data.predicted && step >= 4) return '#159359';
                    if (d.originIdx === data.runner_up && step >= 4) return '#cc8728';
                    return `rgba(47,110,207,${clamp(0.12 + p * 1.4, 0.12, 1)})`;
                })
                .attr('stroke', d => {
                    if (d.layer === 'output' && d.originIdx === data.predicted) return '#0a6f43';
                    if (d.layer === 'hidden' && topSet.has(d.originIdx)) return '#0a6f43';
                    return '#5f786b';
                })
                .attr('stroke-width', d => (d.layer === 'output' && d.originIdx === data.predicted) ? 2 : 1)
                .on('mousemove', (event, d) => {
                    let text = `${d.layer}[${d.originIdx}]`;
                    if (d.layer === 'output') {
                        text += `<br>p = ${(d.activation * 100).toFixed(2)}%`;
                    } else {
                        text += `<br>activation = ${d.activation.toFixed(5)}`;
                    }
                    tooltip.innerHTML = text;
                    tooltip.style.display = 'block';
                    tooltip.style.left = `${event.offsetX + 14}px`;
                    tooltip.style.top = `${event.offsetY + 12}px`;
                })
                .on('mouseleave', () => {
                    tooltip.style.display = 'none';
                });

            svg.selectAll('.olabel')
                .data(outputNodes)
                .enter()
                .append('text')
                .attr('x', d => d.x + 12)
                .attr('y', d => d.y + 4)
                .attr('fill', '#19322a')
                .attr('font-size', 11)
                .text(d => d.originIdx);
        }

        function renderStepCards() {
            const box = document.getElementById('stepCards');
            box.innerHTML = STEP_DEFS.map((step, idx) => {
                const cls = idx === currentStep ? 'active' : (idx < currentStep ? 'done' : '');
                return `<div class="step-card ${cls}"><strong>${idx + 1}. ${step.title}</strong><br>${step.brief}</div>`;
            }).join('');
        }

        function updateStepMeta() {
            const meta = document.getElementById('stepMeta');
            if (!currentData) {
                meta.textContent = '等待样本数据...';
                return;
            }

            const active = currentData.learning?.active_hidden || 0;
            const sparsity = (currentData.learning?.hidden_sparsity || 0) * 100;
            const top = currentData.learning?.top_contributors?.[0];
            const topText = top ? `h${top.hidden_index} (贡献 ${top.contribution.toFixed(4)})` : '无';
            const predProb = (currentData.probabilities?.[currentData.predicted] || currentData.confidence) * 100;

            const lines = [
                `步骤 ${currentStep + 1}/5 · ${STEP_DEFS[currentStep].title}`,
                currentStep === 0 ? `像素已标准化到 [-1, 1]，将 28×28 展开为 784 维输入。` : '',
                currentStep === 1 ? `ReLU 后激活神经元 ${active}/${architecture.hidden_size}，稀疏度 ${sparsity.toFixed(2)}%。` : '',
                currentStep === 2 ? `当前对类别 ${currentData.predicted} 贡献最大的隐藏神经元：${topText}。` : '',
                currentStep === 3 ? `softmax 后类别 ${currentData.predicted} 的概率为 ${predProb.toFixed(2)}%。` : '',
                currentStep === 4 ? `最终结果：预测 ${currentData.predicted}，真实 ${currentData.true_label}，margin ${(currentData.margin * 100).toFixed(2)}%。` : ''
            ].filter(Boolean);

            meta.innerHTML = lines.join('<br>');
        }

        function setStep(next) {
            currentStep = clamp(next, 0, STEP_DEFS.length - 1);
            document.getElementById('stepRange').value = String(currentStep);
            renderStepCards();
            updateStepMeta();
            if (currentData) drawNetwork(currentData, currentStep);
        }

        function stopAutoPlay(resetLabel = true) {
            if (autoTimer) {
                clearInterval(autoTimer);
                autoTimer = null;
            }
            if (resetLabel) {
                document.getElementById('playBtn').textContent = '▶ 自动播放';
            }
        }

        function toggleAutoPlay() {
            if (autoTimer) {
                stopAutoPlay(true);
                return;
            }
            document.getElementById('playBtn').textContent = '⏸ 停止播放';
            const speed = parseInt(document.getElementById('speedSelect').value, 10) || 1500;

            autoTimer = setInterval(() => {
                if (currentStep >= STEP_DEFS.length - 1) {
                    stopAutoPlay(false);
                    document.getElementById('playBtn').textContent = '▶ 重播';
                    return;
                }
                setStep(currentStep + 1);
            }, speed);
        }

        async function loadStats() {
            const stats = await fetchJSON('/api/eval');
            displayStats(stats);
        }

        async function loadFilterIndices(filter) {
            setLoading('正在加载筛选索引...');
            const payload = await fetchJSON(`/api/indices?filter=${encodeURIComponent(filter)}`);
            filteredIndices = Array.isArray(payload.indices) ? payload.indices : [];

            if (filteredIndices.length === 0) {
                document.getElementById('filterStats').textContent = `筛选: ${filter} ｜ 无可用样本`;
                return;
            }

            const pos = filteredIndices.indexOf(currentIndex);
            const textPos = pos >= 0 ? `${pos + 1}/${filteredIndices.length}` : `共 ${filteredIndices.length}`;
            document.getElementById('filterStats').textContent = `筛选: ${filter} ｜ ${textPos}`;
        }

        async function loadSample(index) {
            const safeIndex = clamp(index, 0, 9999);
            currentIndex = safeIndex;
            document.getElementById('indexInput').value = String(safeIndex);

            let data = sampleCache.get(safeIndex);
            if (!data) {
                data = await fetchJSON(`/api/predict?index=${safeIndex}`);
                rememberSample(safeIndex, data);
            }
            currentData = data;

            drawImage(data.pixels);
            displayLabels(data);
            displayProbabilities(data);
            displayContributors(data);
            displayHiddenActivations(data);
            drawNetwork(data, currentStep);
            updateStepMeta();

            const pos = filteredIndices.indexOf(currentIndex);
            if (filteredIndices.length > 0) {
                const textPos = pos >= 0 ? `${pos + 1}/${filteredIndices.length}` : `共 ${filteredIndices.length}`;
                document.getElementById('filterStats').textContent = `筛选: ${currentFilter} ｜ ${textPos}`;
            }
        }

        function moveSample(delta) {
            if (filteredIndices.length === 0) return;
            const pos = filteredIndices.indexOf(currentIndex);
            if (pos < 0) {
                loadSample(filteredIndices[0]);
                return;
            }
            const nextPos = clamp(pos + delta, 0, filteredIndices.length - 1);
            loadSample(filteredIndices[nextPos]);
        }

        function randomSample() {
            if (filteredIndices.length === 0) {
                loadSample(Math.floor(Math.random() * 10000));
                return;
            }
            const idx = Math.floor(Math.random() * filteredIndices.length);
            loadSample(filteredIndices[idx]);
        }

        async function onFilterChanged(filter) {
            currentFilter = filter;
            await loadFilterIndices(filter);
            if (filteredIndices.length > 0) {
                const next = filteredIndices.includes(currentIndex) ? currentIndex : filteredIndices[0];
                await loadSample(next);
            }
        }

        function bindEvents() {
            document.getElementById('indexInput').addEventListener('change', (e) => {
                const index = clamp(parseInt(e.target.value, 10) || 0, 0, 9999);
                loadSample(index);
            });

            document.getElementById('filterSelect').addEventListener('change', (e) => {
                onFilterChanged(e.target.value).catch(err => console.error(err));
            });

            document.getElementById('prevBtn').addEventListener('click', () => moveSample(-1));
            document.getElementById('nextBtn').addEventListener('click', () => moveSample(1));
            document.getElementById('randomBtn').addEventListener('click', randomSample);

            document.getElementById('stepRange').addEventListener('input', (e) => {
                stopAutoPlay(true);
                setStep(parseInt(e.target.value, 10) || 0);
            });

            document.getElementById('playBtn').addEventListener('click', toggleAutoPlay);
            document.getElementById('speedSelect').addEventListener('change', () => {
                if (autoTimer) {
                    stopAutoPlay(false);
                    toggleAutoPlay();
                }
            });

            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') moveSample(-1);
                if (e.key === 'ArrowRight') moveSample(1);
            });
        }

        async function init() {
            try {
                architecture = await fetchJSON('/api/architecture');
                renderStepCards();
                setStep(0);
                bindEvents();
                await Promise.all([loadStats(), loadFilterIndices('all')]);
                await loadSample(0);
            } catch (err) {
                document.querySelector('.container').innerHTML = `<div class="error-message">页面加载失败: ${err.message}</div>`;
                console.error(err);
            }
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
